<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}} — 任广科</title>
  {{OG_TAGS}}
  <link rel="alternate" type="application/rss+xml" title="任广科" href="../feed.xml" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    .article-page { padding: 60px 2rem 80px; }
    .article-page-inner { max-width: 760px; margin: 0 auto; }
    .back-link {
      display: inline-flex; align-items: center; gap: .4rem;
      color: var(--muted); font-size: .9rem; margin-bottom: 2rem;
      transition: color .2s;
    }
    .back-link:hover { color: var(--text); text-decoration: none; }
    .article-page h1 {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700; line-height: 1.35;
      margin: 1rem 0 1.2rem;
    }
    .article-page-meta {
      display: flex; gap: 1.2rem; flex-wrap: wrap;
      color: var(--muted); font-size: .88rem;
      padding-bottom: 1.4rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.8rem;
    }
    .article-page-summary {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 1.2rem 1.4rem;
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 2rem;
    }
    .toc {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.4rem;
      margin-bottom: 2rem;
      font-size: .88rem;
    }
    .toc-title {
      font-size: .78rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted); margin-bottom: .7rem;
    }
    .toc ol { list-style: none; margin: 0; padding: 0; counter-reset: toc; }
    .toc li { margin-bottom: .3rem; line-height: 1.5; }
    .toc-l2 { counter-increment: toc; }
    .toc-l2::before { content: counter(toc) ". "; color: var(--muted); font-size: .8rem; }
    .toc-l3 { padding-left: 1.4rem; }
    .toc-l3::before { content: "· "; color: var(--muted); }
    .toc a { color: var(--muted); }
    .toc a:hover { color: var(--accent); text-decoration: none; }
    .article-body { line-height: 1.9; color: var(--muted); }
    .article-body p { margin-bottom: 1.2rem; }
    .article-body h2 { font-size: 1.15rem; font-weight: 700; color: var(--text); margin: 2rem 0 .8rem; }
    .article-body h3 { font-size: 1rem; font-weight: 600; color: var(--text); margin: 1.5rem 0 .6rem; }
    .article-body strong { color: var(--text); }
    .article-figure { margin: 1.8rem 0; text-align: center; }
    .article-figure img { max-width: 100%; height: auto; border-radius: var(--radius); border: 1px solid var(--border); }
    .article-figure figcaption { margin-top: .5rem; font-size: .83rem; color: var(--muted); }
    .data-table { width: 100%; border-collapse: collapse; margin: 1.8rem 0; font-size: .9rem; overflow-x: auto; display: block; }
    .data-table caption { caption-side: top; text-align: left; font-size: .83rem; color: var(--muted); margin-bottom: .6rem; }
    .data-table th, .data-table td { padding: .55rem .9rem; border: 1px solid var(--border); text-align: center; }
    .data-table th { background: var(--bg-card); color: var(--text); font-weight: 600; }
    .data-table td { color: var(--muted); }
    .data-table tr:hover td { background: var(--bg-hover); }
    .fn-ref a { color: var(--accent); text-decoration: none; font-size: .75em; vertical-align: super; line-height: 0; }
    .footnotes { margin-top: 3rem; padding-top: 1.4rem; border-top: 1px solid var(--border); font-size: .83rem; color: var(--muted); }
    .footnotes hr { display: none; }
    .footnotes ol { padding-left: 1.4rem; margin: 0; }
    .footnotes li { margin-bottom: .5rem; line-height: 1.7; }
    .fn-back { color: var(--muted); margin-left: .3rem; text-decoration: none; }
    .fn-back:hover { color: var(--accent); }
    .journal-box {
      display: flex; align-items: flex-start; gap: 1rem;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.2rem 1.4rem;
      margin-bottom: 2rem;
    }
    .journal-icon { font-size: 1.6rem; flex-shrink: 0; margin-top: .1rem; }
    .journal-label { font-size: .78rem; color: var(--muted); margin-bottom: .3rem; }
    .journal-name { font-size: 1rem; font-weight: 600; color: var(--text); margin-bottom: .5rem; }
    .journal-note { font-size: .83rem; color: var(--muted); }
  </style>
</head>
<body>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; });
      }
    });
  }
</script>

<nav>
  <a href="../index.html" class="nav-logo">任广科</a>
  <ul class="nav-links">
    <li><a href="../about.html">关于</a></li>
    <li><a href="../index.html#articles">文章</a></li>
    <li><a href="../activities.html">活动</a></li>
    <li><a href="../index.html#contact">联系</a></li>
  </ul>
</nav>

<article class="article-page">
  <div class="article-page-inner">
    <a href="../index.html#articles" class="back-link">← 返回文章列表</a>
    <span class="article-cat {{CAT_CLASS}}">{{CAT_LABEL}}</span>
    <h1>{{TITLE}}</h1>
    <div class="article-page-meta">
      <span>{{DATE}}</span>
      <span>{{TYPE}}</span>
    </div>
    <div class="article-page-summary">
      <p>{{SUMMARY}}</p>
    </div>
    {{JOURNAL_BOX}}
    {{TOC}}
    {{BODY}}
    {{EXTERNAL_LINK}}
  </div>
</article>

<footer>
  <p>© 2025 任广科&nbsp;·&nbsp;保留所有权利&nbsp;·&nbsp;<a href="../feed.xml" style="color:var(--muted)">RSS</a></p>
</footer>
</body>
</html>
