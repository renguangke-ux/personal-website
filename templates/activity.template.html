<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}} — 任广科</title>
  <meta name="description" content="{{DESCRIPTION}}" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    .activity-page { padding: 60px 2rem 80px; }
    .activity-page-inner { max-width: 800px; margin: 0 auto; }
    .back-link {
      display: inline-flex; align-items: center; gap: .4rem;
      color: var(--muted); font-size: .9rem; margin-bottom: 2rem;
      transition: color .2s;
    }
    .back-link:hover { color: var(--text); text-decoration: none; }
    .activity-label {
      display: inline-block;
      font-size: .75rem; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase; padding: .25rem .7rem;
      border-radius: 99px; background: var(--accent-dim);
      color: var(--accent); margin-bottom: 1rem;
    }
    .activity-page h1 {
      font-size: clamp(1.3rem, 3vw, 1.9rem);
      font-weight: 700; line-height: 1.4;
      margin: 0 0 1.2rem;
    }
    .activity-meta {
      display: flex; gap: 1.4rem; flex-wrap: wrap;
      color: var(--muted); font-size: .88rem;
      padding-bottom: 1.4rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }
    .activity-meta span { display: flex; align-items: center; gap: .35rem; }
    .activity-photos-grid {
      display: grid;
      gap: .9rem;
      margin-bottom: 2.2rem;
    }
    .activity-photos-grid.cols-1 { grid-template-columns: 1fr; }
    .activity-photos-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
    .activity-photos-grid img {
      width: 100%; height: 100%;
      max-height: 400px;
      object-fit: cover;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .activity-photos-grid.cols-1 img { max-height: 460px; }
    .activity-body {
      font-size: .97rem; line-height: 1.95;
      color: var(--muted);
    }
    .activity-body p { margin-bottom: 1.2rem; }
    @media (max-width: 600px) {
      .activity-photos-grid.cols-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; });
      }
    });
  }
</script>

<nav>
  <a href="../index.html" class="nav-logo">任广科</a>
  <ul class="nav-links">
    <li><a href="../about.html">关于</a></li>
    <li><a href="../index.html#articles">文章</a></li>
    <li><a href="../index.html#activities">活动</a></li>
    <li><a href="../index.html#contact">联系</a></li>
  </ul>
</nav>

<div class="activity-page">
  <div class="activity-page-inner">
    <a href="../index.html#activities" class="back-link">← 返回社会活动</a>
    <div class="activity-label">社会活动</div>
    <h1>{{TITLE}}</h1>
    <div class="activity-meta">
      <span>📅 {{DATE}}</span>
      {{LOCATION_SPAN}}
    </div>
    {{PHOTOS_GRID}}
    <div class="activity-body">
      {{BODY}}
    </div>
  </div>
</div>

<footer>
  <p>© 2025 任广科&nbsp;·&nbsp;保留所有权利</p>
</footer>
</body>
</html>
